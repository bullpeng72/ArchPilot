connections:
- from: iot_gps
  to: aws_iot_core
  protocol: MQTT over TLS
- from: aws_iot_core
  to: kinesis_gps
  protocol: IoT Rules → Kinesis
- from: kinesis_gps
  to: flink_tracking
  protocol: KCL
- from: flink_tracking
  to: redis_tracking
  protocol: AWS SDK (최신 위치 갱신)
- from: flink_tracking
  to: timestream_gps
  protocol: AWS SDK (이력 저장)
- from: flink_tracking
  to: dynamodb_events
  protocol: AWS SDK (이상 이벤트)
- from: flink_tracking
  to: notification_svc_aws
  protocol: SNS (ETA 변경 알림)
- from: shipper_portal
  to: api_gw_aws
  protocol: HTTPS
- from: driver_app
  to: api_gw_aws
  protocol: HTTPS / WebSocket
- from: api_gw_aws
  to: tracking_svc
  protocol: REST / WebSocket
- from: api_gw_aws
  to: routing_svc
  protocol: REST
- from: tracking_svc
  to: redis_tracking
  protocol: RESP3 (GEOPOS)
- from: tracking_svc
  to: dynamodb_events
  protocol: AWS SDK
- from: oms
  to: onprem_mq
  protocol: AMQP
- from: onprem_mq
  to: aws_dx
  protocol: AMQP Bridge
- from: aws_dx
  to: kinesis_orders
  protocol: Kinesis SDK
- from: kinesis_orders
  to: flink_tracking
  protocol: KCL (주문-배송 매칭)
- from: kinesis_orders
  to: s3_data_lake
  protocol: Firehose
- from: hub_terminal
  to: wms
  protocol: HTTPS / Thin Client
- from: wms
  to: onprem_db_oracle
  protocol: JDBC
- from: wms
  to: esb_onprem
  protocol: SAP RFC / IDOC
- from: esb_onprem
  to: erp
  protocol: IDOC / RFC
- from: erp
  to: onprem_db_oracle
  protocol: HANA DB
- from: tms
  to: oms
  protocol: REST (배차 확정)
- from: tms
  to: routing_svc
  protocol: HTTPS (경로 최적화 요청)
- from: hub_wcs
  to: wms
  protocol: OPC-UA / REST (분류기 이벤트)
- from: barcode_print
  to: wms
  protocol: ZPL / HTTP
- from: erp
  to: aws_dx
  protocol: SAP LT Replication / RFC
- from: aws_dx
  to: api_gw_aws
  protocol: Internal VPC
- from: s3_data_lake
  to: dataflow
  protocol: GCS Transfer / Beam
- from: dataflow
  to: bq_analytics
  protocol: BigQuery Write API
- from: bq_analytics
  to: looker
  protocol: BigQuery Connector
- from: s3_data_lake
  to: az_data_factory
  protocol: Azure Blob → ADF
- from: az_data_factory
  to: az_synapse
  protocol: Synapse Connector
- from: az_synapse
  to: az_ml
  protocol: ML Dataset
- from: az_ml
  to: az_api
  protocol: REST (배포 엔드포인트)
- from: az_api
  to: routing_svc
  protocol: REST (수요예측 → 경로 최적화)
- from: cloudwatch_aws
  to: tracking_svc
  protocol: CloudWatch Agent
- from: cloudwatch_aws
  to: flink_tracking
  protocol: CloudWatch Metrics
