name: Large-Scale Logistics & Supply Chain Platform
description: 2015년 구축된 대규모 물류·공급망 관리 시스템. 일 주문 처리 150만 건, 허브 터미널 220개, 배송 차량 GPS 12만
  대 실시간 추적. 온프레미스 ERP/WMS + AWS 실시간 트래킹 + Azure ML 수요예측 + GCP BigQuery 분석.
