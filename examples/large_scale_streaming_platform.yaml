name: Large-Scale Video Streaming Platform
description: 2017년 구축된 대규모 OTT 동영상 스트리밍 플랫폼. MAU 2,800만, 동시 시청 피크 180만 세션, 일 CDN 트래픽
  8PB. AWS 멀티 리전(ap-northeast-2 Primary, us-east-1 글로벌 컨트롤) + 온프레미스 트랜스코딩 팜 + Cloudflare
  CDN.
